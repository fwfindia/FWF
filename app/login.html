<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#07090f">
  <meta name="description" content="Sign in to your FWF member account">
  <title>Login – FWF</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" href="https://www.fwfindia.org/assets/images/logo.png">
  <link rel="apple-touch-icon" href="https://www.fwfindia.org/assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://www.fwfindia.org/assets/css/fwf-app.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Mukta:wght@400;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
</head>
<body>
<header class="app-topbar">
  <a href="/app/home" class="tb-btn" style="flex-shrink:0;font-size:18px">&#8592;</a>
  <div style="flex:1;text-align:center"><span style="font-size:16px;font-weight:800">Sign In</span></div>
  <a href="/join" class="tb-btn" style="font-size:11px;font-weight:800;width:auto;padding:0 12px;color:var(--orange)">Join</a>
</header>
<div id="toast-container"></div>

<div style="min-height:calc(100vh - var(--topbar-h) - var(--tabbar-h));display:flex;flex-direction:column;justify-content:center;padding:24px 20px">
  <div style="text-align:center;margin-bottom:32px">
    <div style="width:72px;height:72px;border-radius:22px;background:#fff;padding:10px;margin:0 auto 16px;box-shadow:0 8px 32px rgba(255,255,255,.15)">
      <img src="https://www.fwfindia.org/assets/images/logo.png" style="width:100%;height:100%;object-fit:contain" alt="FWF">
    </div>
    <h1 style="font-size:22px;margin-bottom:6px">Welcome Back &#128075;</h1>
    <p style="font-size:14px;color:var(--t3)">Login to your FWF account</p>
  </div>

  <form id="login-form" style="display:flex;flex-direction:column;gap:0">
    <div class="form-group">
      <label class="form-label">Mobile / Member ID <span>*</span></label>
      <div class="input-wrap">
        <span class="input-icon">&#128241;</span>
        <input type="text" id="login-id" class="form-input" placeholder="Mobile number or Member ID" autocomplete="username" required>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password <span>*</span></label>
      <div class="input-wrap has-action">
        <span class="input-icon">&#128274;</span>
        <input type="password" id="login-pass" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
        <button type="button" class="input-action" onclick="togglePass()" id="pass-toggle">&#128065;</button>
      </div>
    </div>

    <a href="/app/forgot-password" style="font-size:13px;color:var(--orange);font-weight:700;text-align:right;margin-bottom:20px">Forgot Password?</a>

    <button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn">
      &#128275; Sign In
    </button>
  </form>

  <div style="text-align:center;margin-top:24px;font-size:13px;color:var(--t3)">
    New to FWF? <a href="/join" style="color:var(--orange);font-weight:700">Join as Member</a>
  </div>

  <div style="margin-top:16px" class="alert alert-info">
    <i>&#8505;&#65039;</i>
    <span>Use your registered mobile number or Member ID (e.g. FWF-000001) as username.</span>
  </div>
</div>

<nav class="app-tabs">
  <a href="/app/home" class="tab-item"><span class="tab-icon">&#127968;</span><span class="tab-label">Home</span></a>
  <a href="/app/projects" class="tab-item"><span class="tab-icon">&#127807;</span><span class="tab-label">Projects</span></a>
  <a href="/app/donate" class="tab-fab"><div class="fab-circle">&#128152;</div><span class="fab-label">Donate</span></a>
  <a href="/app/quiz" class="tab-item"><span class="tab-icon">&#127922;</span><span class="tab-label">Quiz</span></a>
  <a href="/app/profile" class="tab-item active"><span class="tab-icon">&#128100;</span><span class="tab-label">Account</span></a>
</nav>

<script>

function showToast(msg, type='info') {
  const icons = {success:'&#9989;', error:'&#10060;', info:'&#8505;&#65039;', warning:'&#9888;&#65039;'};
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = '<i>' + (icons[type]||icons.info) + '</i><span>' + msg + '</span>';
  const c = document.getElementById('toast-container');
  if (c) c.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 350); }, 3200);
}
function togglePass() {
  const inp = document.getElementById('login-pass');
  const btn = document.getElementById('pass-toggle');
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '&#128064;'; }
  else { inp.type = 'password'; btn.innerHTML = '&#128065;'; }
}
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const id = document.getElementById('login-id').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!id || !pass) { showToast('Please fill all fields', 'error'); return; }
  btn.classList.add('loading');
  btn.textContent = '';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', credentials: 'include',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ mobile: id, password: pass })
    });
    const data = await res.json();
    if (data.ok || data.token) {
      if (data.token) localStorage.setItem('fwf-token', data.token);
      if (data.user) localStorage.setItem('fwf-user', JSON.stringify(data.user));
      showToast('Login successful!', 'success');
      setTimeout(() => { window.location.href = '/app/dashboard'; }, 800);
    } else {
      showToast(data.error || 'Login failed. Check your credentials.', 'error');
      btn.classList.remove('loading');
      btn.innerHTML = '&#128275; Sign In';
    }
  } catch(err) {
    showToast('Network error. Please try again.', 'error');
    btn.classList.remove('loading');
    btn.innerHTML = '&#128275; Sign In';
  }
});
// Redirect if already logged in
if (localStorage.getItem('fwf-token')) window.location.href = '/app/dashboard';
</script>
</body>
</html>
