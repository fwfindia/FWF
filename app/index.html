<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0b1220">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FWF">
  <title>FWF</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="apple-touch-icon" href="/assets/images/logo.png">
  <link rel="icon" href="/assets/images/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%; width: 100%;
      background: #0b1220;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      /* Safe area for notch phones */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .splash-logo {
      width: 96px; height: 96px;
      border-radius: 26px;
      background: #fff;
      padding: 12px;
      object-fit: contain;
      box-shadow: 0 20px 60px rgba(249,115,22,0.35);
      animation: logoPop .6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }
    @keyframes logoPop {
      from { opacity: 0; transform: scale(0.6) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .splash-name {
      margin-top: 20px;
      font-size: 28px; font-weight: 900;
      color: #f1f5f9;
      letter-spacing: -.02em;
      animation: fadeUp .5s .25s ease forwards;
      opacity: 0;
    }

    .splash-tagline {
      margin-top: 6px;
      font-size: 13px; font-weight: 500;
      color: #64748b;
      animation: fadeUp .5s .4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Ring spinner */
    .splash-ring {
      margin-top: 44px;
      width: 36px; height: 36px;
      border: 3px solid rgba(249,115,22,.2);
      border-top-color: #f97316;
      border-radius: 50%;
      animation: fadeUp .4s .55s ease forwards, spin .8s linear infinite;
      opacity: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Glow blob behind logo */
    .glow {
      position: absolute;
      width: 280px; height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,.15) 0%, transparent 70%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <img class="splash-logo" src="/assets/images/logo.png" alt="FWF">
  <div class="splash-name">FWF</div>
  <div class="splash-tagline">Foundris Welfare Foundation</div>
  <div class="splash-ring"></div>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/app/sw.js', { scope: '/app/' }).catch(() => {});
    }

    // Splash → home after 1.8s
    setTimeout(() => {
      window.location.replace('/app/home');
    }, 1800);
  </script>
</body>
</html>
