<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#06060d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FWF">
  <title>FWF</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="apple-touch-icon" href="/assets/images/logo.png">
  <link rel="icon" href="/assets/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html,body {
      height:100%; width:100%;
      background:#06060d;
      display:flex; align-items:center; justify-content:center;
      flex-direction:column;
      font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
      overflow:hidden;
      padding-top:env(safe-area-inset-top);
      padding-bottom:env(safe-area-inset-bottom);
    }
    .glow-bg {
      position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,58,237,0.25) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(249,115,22,0.18) 0%, transparent 60%);
    }
    .splash-logo {
      width:100px; height:100px;
      border-radius:28px;
      background:#fff;
      padding:14px;
      object-fit:contain;
      box-shadow:0 20px 70px rgba(124,58,237,0.5), 0 0 0 1px rgba(255,255,255,0.07);
      animation:logoIn .7s cubic-bezier(0.34,1.56,0.64,1) forwards;
      opacity:0;
      position:relative; z-index:1;
    }
    @keyframes logoIn {
      from { opacity:0; transform:scale(0.5) rotate(-8deg); }
      to   { opacity:1; transform:scale(1) rotate(0deg); }
    }
    .splash-name {
      margin-top:22px;
      font-size:32px; font-weight:900;
      letter-spacing:-0.5px;
      animation:fadeUp .5s .3s ease forwards;
      opacity:0;
      background:linear-gradient(135deg, #a78bfa 0%, #f97316 100%);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      position:relative; z-index:1;
    }
    .splash-tagline {
      margin-top:8px;
      font-size:13px; font-weight:500; color:#3b4265;
      animation:fadeUp .5s .45s ease forwards;
      opacity:0;
      position:relative; z-index:1;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .splash-loader {
      margin-top:52px;
      animation:fadeUp .5s .65s ease forwards;
      opacity:0;
      position:relative; z-index:1;
    }
    .splash-loader svg { width:42px; height:42px; }
    .ring-track { fill:none; stroke:rgba(139,92,246,0.12); stroke-width:3; }
    .ring-fill  {
      fill:none; stroke:url(#rg); stroke-width:3;
      stroke-linecap:round; stroke-dasharray:100; stroke-dashoffset:100;
      animation:ringLoad 1.5s .85s ease forwards;
      transform-origin:center; transform:rotate(-90deg);
    }
    @keyframes ringLoad { to { stroke-dashoffset:0; } }
    .version-tag {
      position:fixed;
      bottom:calc(24px + env(safe-area-inset-bottom,0));
      font-size:11px; color:#2d3650; font-weight:600;
      animation:fadeUp .5s .9s ease forwards;
      opacity:0;
    }
  </style>
</head>
<body>
  <div class="glow-bg"></div>
  <img class="splash-logo" src="/assets/images/logo.png" alt="FWF"
       onerror="this.src='/assets/images/logo.png'">
  <div class="splash-name">FWF</div>
  <div class="splash-tagline">Skills to Livelihood</div>
  <div class="splash-loader">
    <svg viewBox="0 0 36 36">
      <defs>
        <linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7c3aed"/>
          <stop offset="100%" stop-color="#f97316"/>
        </linearGradient>
      </defs>
      <circle class="ring-track" cx="18" cy="18" r="15.9"/>
      <circle class="ring-fill"  cx="18" cy="18" r="15.9"/>
    </svg>
  </div>
  <div class="version-tag">FWF App v3.0 · Aura</div>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/app/sw.js', { scope: '/app/', updateViaCache: 'none' }).then(reg => reg.update()).catch(() => {});
    }
    setTimeout(() => {
      const token = localStorage.getItem('fwf-token');
      window.location.replace(token ? '/app/dashboard' : '/app/home');
    }, 1800);
  </script>
</body>
</html>
