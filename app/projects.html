<script>

function showToast(msg, type='info') {
  const icons = {success:'&#9989;', error:'&#10060;', info:'&#8505;&#65039;', warning:'&#9888;&#65039;'};
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.innerHTML = '<i>' + (icons[type]||icons.info) + '</i><span>' + msg + '</span>';
  const c = document.getElementById('toast-container');
  if (c) c.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 350); }, 3200);
}

const API = 'https://fwf-production.up.railway.app';
function getToken() { return localStorage.getItem('fwf-token'); }
function getUser()  { return JSON.parse(localStorage.getItem('fwf-user') || 'null'); }
function isLoggedIn() { return !!getToken(); }
async function apiCall(url, opts={}) {
  const token = getToken();
  const headers = { 'Content-Type':'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) };
  const res = await fetch(url, { credentials: 'include', ...opts, headers: { ...headers, ...(opts.headers||{}) } });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}
function logout() {
  localStorage.removeItem('fwf-token');
  localStorage.removeItem('fwf-user');
  window.location.href = '/app/login';
}
function updateTopbarUser() {
  const user = getUser();
  const btn = document.getElementById('topbar-user');
  if (!btn) return;
  if (user) {
    btn.href = '/app/dashboard';
    btn.innerHTML = '<span style="font-size:13px;font-weight:800;line-height:1">' + (user.name||'U').charAt(0).toUpperCase() + '</span>';
    btn.style.cssText = 'background:linear-gradient(135deg,var(--orange),var(--orange-d));color:#fff;border-radius:50%;width:36px;height:36px;border:2px solid rgba(255,255,255,.2)';
  }
}

let currentFilter = 'all';

function renderProjects(filter) {
  const list = filter === 'all' ? PROJECTS : PROJECTS.filter(p => p.category === filter);
  const container = document.getElementById('projects-container');
  const lang = document.documentElement.getAttribute('data-lang') || 'en';
  if (!list.length) {
    container.innerHTML = '<div class="empty-state"><div class="es-icon">&#127807;</div><h3>No projects in this category</h3><p>Check back soon!</p></div>';
    return;
  }
  container.innerHTML = list.map(p => {
    const colors = { orange:'rgba(249,115,22,.2)',blue:'rgba(59,130,246,.2)',green:'rgba(16,185,129,.2)',purple:'rgba(139,92,246,.2)',yellow:'rgba(245,158,11,.2)' };
    const textColors = { orange:'var(--orange)',blue:'var(--blue)',green:'var(--green)',purple:'var(--purple)',yellow:'var(--yellow)' };
    const fundedPct = parseInt(p.funded);
    return `<a href="/projects/${p.id}" class="project-card fade-up" style="text-decoration:none">
      <div class="pc-top">
        <div class="pc-tag" style="background:${colors[p.color]||colors.orange};color:${textColors[p.color]||textColors.orange}">${p.icon} ${p.tag}</div>
        <div class="pc-name">${lang==='hi'&&p.nameHi ? p.nameHi : p.name}</div>
        <div class="pc-desc">${p.desc}</div>
        <div class="pc-stats">
          <div class="pc-stat"><div class="psv">${p.cost}</div><div class="psl">Project Cost</div></div>
          <div class="pc-stat"><div class="psv" style="color:var(--green)">${p.funded}</div><div class="psl">Subsidized</div></div>
          <div class="pc-stat"><div class="psv">${p.members}+</div><div class="psl">Members</div></div>
        </div>
        <div class="progress-wrap">
          <div class="progress-label"><span>Funding Progress</span><span style="color:var(--green)">${p.funded}</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:${fundedPct}%"></div></div>
        </div>
      </div>
      <div class="pc-bottom">
        <span style="font-size:12px;color:var(--t3)">FWF Member Project</span>

}

function filterProjects(cat) {
  document.querySelectorAll('.chip-strip .chip').forEach(c => { c.style.background = ''; c.style.color = ''; c.style.borderColor = ''; });
  const activeMap = { orange: 'rgba(249,115,22,.18)', blue: 'rgba(59,130,246,.15)', green: 'rgba(16,185,129,.15)', all: 'rgba(249,115,22,.18)' };
  const btn = document.getElementById('f-' + cat);
  if (btn) { btn.style.background = 'rgba(249,115,22,.18)'; btn.style.color = 'var(--orange-l)'; btn.style.borderColor = 'rgba(249,115,22,.3)'; }
  currentFilter = cat;
  renderProjects(cat);
}
