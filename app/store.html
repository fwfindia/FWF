<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
  <meta name="theme-color" content="#131921">
  <meta name="description" content="Buy handmade products from FWF members - support women entrepreneurs">
  <title>FWF Store</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" href="/assets/images/logo.png">
  <link rel="apple-touch-icon" href="/assets/images/logo.png">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#131921;
  --nav2:#232f3e;
  --orange:#f90;
  --orange2:#e47911;
  --link:#007185;
  --green:#007600;
  --red:#b12704;
  --star:#f90;
  --badge-red:#cc0c39;
  --bg:#eaeded;
  --card:#fff;
  --border:#ddd;
  --muted:#565959;
  --tabs-h:60px;
  --top-h:56px;
}
html,body{height:100%;scroll-behavior:smooth}
body{background:var(--bg);color:#111;font-family:'Inter',Arial,sans-serif;font-size:14px;padding-top:var(--top-h);padding-bottom:var(--tabs-h)}

/* TOPBAR */
.s-topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:var(--navy);height:var(--top-h);display:flex;align-items:center;gap:8px;padding:0 12px}
.s-topbar .logo{display:flex;align-items:center;gap:6px;text-decoration:none;flex-shrink:0}
.s-topbar .logo img{height:28px;filter:brightness(10)}
.s-topbar .logo-text{color:#fff;font-size:13px;font-weight:800}
.s-topbar .s-search{flex:1;display:flex;height:36px;border-radius:4px;overflow:hidden}
.s-topbar .s-search input{flex:1;border:none;padding:0 10px;font-size:14px;outline:none;min-width:0}
.s-topbar .s-search button{background:var(--orange);border:none;width:40px;cursor:pointer;color:var(--navy);font-size:14px}
.tb-right{display:flex;align-items:center;gap:2px;flex-shrink:0}
.tb-icon-btn{background:none;border:2px solid transparent;border-radius:3px;color:#fff;font-size:20px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;text-decoration:none}
.tb-icon-btn:hover{border-color:#fff}
.tb-badge{position:absolute;top:2px;right:2px;background:var(--orange);color:#111;font-size:10px;font-weight:800;min-width:17px;height:17px;padding:0 4px;border-radius:10px;display:flex;align-items:center;justify-content:center}

/* CATEGORY CIRCLES */
.cat-circles-wrap{background:#fff;border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.cat-circles-wrap::-webkit-scrollbar{display:none}
.cat-circles{display:flex;padding:10px 8px;gap:0;-webkit-overflow-scrolling:touch}
.cat-circle-item{display:flex;flex-direction:column;align-items:center;gap:5px;padding:4px 10px;cursor:pointer;flex-shrink:0;min-width:72px}
.cat-circle-img{width:56px;height:56px;border-radius:50%;background:#f0f2f2;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid transparent;transition:.2s}
.cat-circle-item.active .cat-circle-img{border-color:var(--orange2)}
.cat-circle-label{font-size:11px;color:#111;text-align:center;line-height:1.2;font-weight:500}
.cat-circle-item.active .cat-circle-label{color:var(--orange2);font-weight:700}

/* OFFER BANNER */
.offer-banner{background:linear-gradient(135deg,#232f3e,#37475a);padding:12px 14px;display:flex;align-items:center;gap:10px}
.offer-badge{background:var(--orange);color:#111;font-size:10px;font-weight:800;padding:2px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0}
.offer-text{color:#fff;font-size:13px;font-weight:600}
.offer-sub{color:rgba(255,255,255,.6);font-size:11px;margin-top:1px}

/* SORT BAR */
.sort-bar{background:#fff;padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);gap:8px}
.result-cnt{font-size:12px;color:var(--muted)}
.sort-select{border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-size:12px;background:#fff;cursor:pointer;outline:none;font-family:inherit}

/* PRODUCT GRID */
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px}

/* PRODUCT CARD */
.product-card{background:var(--card);border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid var(--border);display:flex;flex-direction:column}
.product-card:active{box-shadow:0 2px 12px rgba(0,0,0,.15)}
.card-img{position:relative;background:#f8f8f8;height:150px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img-ph{font-size:40px;color:#ccc}
.card-disc-badge{position:absolute;top:0;left:0;background:var(--badge-red);color:#fff;font-size:10px;font-weight:800;padding:2px 6px;border-radius:0 0 4px 0}
.wish-btn{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.9);border:1px solid #ddd;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:#777}
.wish-btn.wishlisted{color:var(--badge-red);border-color:var(--badge-red)}
.card-body{padding:8px 10px 10px;flex:1;display:flex;flex-direction:column}
.card-name{font-size:12px;font-weight:500;color:#111;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;min-height:32px}
.card-seller{font-size:10px;color:var(--muted);margin-bottom:4px}
.card-stars{display:flex;align-items:center;gap:3px;margin-bottom:4px}
.stars{color:var(--star);font-size:11px;letter-spacing:-.5px}
.star-cnt{font-size:10px;color:var(--link)}
.price-row{display:flex;align-items:baseline;gap:4px;flex-wrap:wrap;margin-top:auto;padding-top:4px}
.card-price{font-size:16px;font-weight:800;color:#111}
.card-mrp{font-size:10px;color:var(--muted);text-decoration:line-through}
.card-off{font-size:10px;color:var(--red);font-weight:700}
.card-free{font-size:10px;color:var(--green);font-weight:600;margin-top:2px}
.card-btn{width:100%;background:#ffd814;border:none;border-radius:16px;padding:6px;font-size:12px;font-weight:700;cursor:pointer;margin-top:6px;color:#111;font-family:inherit}
.card-btn:hover{background:#f7ca00}

/* EMPTY + LOADING */
.empty-state{grid-column:1/-1;text-align:center;padding:40px 20px;background:#fff;border-radius:6px;margin:4px}
.empty-state .es-icon{font-size:3rem;margin-bottom:8px;opacity:.4}
.empty-state h3{font-size:16px;font-weight:700;margin-bottom:4px}
.empty-state p{font-size:13px;color:var(--muted)}
.skeleton{background:linear-gradient(90deg,#f0f2f2 25%,#e0e2e2 50%,#f0f2f2 75%);background-size:200% 100%;animation:skel 1.4s infinite;border-radius:6px}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:4px;padding:12px 8px;flex-wrap:wrap}
.pagination button{padding:6px 12px;border:1px solid var(--border);background:#fff;color:var(--link);font-size:12px;cursor:pointer;border-radius:4px;font-family:inherit}
.pagination button.active{background:#ffd814;border-color:#e47911;color:#111;font-weight:700}
.pagination button:disabled{opacity:.4;cursor:not-allowed}

/* SELL CTA */
.sell-cta{background:linear-gradient(135deg,#fff8ee,#fff3dc);border:1px solid #f0d080;border-radius:8px;margin:8px;padding:14px 16px;display:none}
.sell-cta h4{font-size:14px;font-weight:800;margin-bottom:4px}
.sell-cta p{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:10px}
.sell-cta a{display:block;text-align:center;background:#ffd814;border:1px solid #e47911;border-radius:22px;padding:9px;font-size:13px;font-weight:700;text-decoration:none;color:#111}

/* PRODUCT SHEET */
.sheet-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5)}
.sheet-overlay.show{display:block}
.product-sheet{position:fixed;left:0;right:0;bottom:-100%;z-index:301;background:#fff;border-radius:16px 16px 0 0;display:flex;flex-direction:column;transition:bottom .3s ease;max-height:92vh}
.product-sheet.show{bottom:0}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 4px}
.sheet-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:50%;background:#f0f2f2;border:none;cursor:pointer;font-size:14px;color:#555;display:flex;align-items:center;justify-content:center}
.sheet-body{overflow-y:auto;flex:1;padding-bottom:24px}
.sheet-loading{text-align:center;padding:40px;color:var(--muted)}
@keyframes spin{to{transform:rotate(360deg)}}
.sheet-info{padding:14px 16px}
.sheet-cat{font-size:11px;color:var(--link);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sheet-title{font-size:17px;font-weight:700;color:#111;line-height:1.3;margin-bottom:4px}
.sheet-seller{font-size:12px;color:var(--muted);margin-bottom:8px}
.sheet-stars{display:flex;align-items:center;gap:6px;margin-bottom:12px}
.sheet-price-row{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.sheet-price{font-size:26px;font-weight:800;color:#111}
.sheet-mrp{font-size:13px;color:var(--muted);text-decoration:line-through}
.sheet-off{font-size:13px;color:var(--red);font-weight:700}
.sheet-stock{font-size:13px;font-weight:700;margin-bottom:12px}
.sheet-stock.green{color:var(--green)}
.sheet-stock.orange{color:#e47911}
.sheet-stock.red{color:var(--red)}
.sheet-actions{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.btn-sheet-cart{background:#ffd814;border:1px solid #e47911;border-radius:22px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;color:#111;font-family:inherit;width:100%}
.btn-sheet-buy{background:#ff9900;border:1px solid #FF8C00;border-radius:22px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;color:#111;font-family:inherit;width:100%}
.btn-sheet-wish{background:#fff;border:1px solid #ddd;border-radius:22px;padding:10px;font-size:13px;cursor:pointer;color:#111;font-family:inherit;width:100%}
.btn-sheet-wish.wishlisted{border-color:var(--badge-red);color:var(--badge-red)}
.sheet-desc{font-size:13px;color:#333;line-height:1.7;margin-bottom:12px;border-top:1px solid #f0f0f0;padding-top:12px}
.order-section{border-top:1px solid #eee;padding-top:14px}
.order-section h4{font-size:14px;font-weight:700;margin-bottom:10px}
.order-form{display:flex;flex-direction:column;gap:8px}
.order-form input,.order-form textarea,.order-form select{width:100%;border:1px solid #ccc;border-radius:4px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none}
.order-form input:focus,.order-form textarea:focus{border-color:var(--orange2)}
.order-form textarea{resize:vertical;min-height:60px}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-btn{width:34px;height:34px;border:1px solid #ccc;background:#f0f2f2;border-radius:4px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
.qty-val{font-size:15px;font-weight:700;min-width:26px;text-align:center}
.btn-order{background:#ffd814;border:1px solid #e47911;border-radius:22px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;color:#111;width:100%;margin-top:4px;font-family:inherit}
.btn-order:disabled{opacity:.5;cursor:not-allowed}
.order-success{display:none;text-align:center;padding:24px 16px}
.order-success.show{display:block}
.order-success .ok-icon{font-size:2.5rem;color:var(--green);margin-bottom:8px}
.order-success h3{font-size:17px;font-weight:700;color:var(--green);margin-bottom:6px}

/* TOAST */
.toast-msg{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);z-index:1000;background:#111;color:#fff;padding:9px 20px;font-size:13px;font-weight:600;border-radius:22px;transition:.3s;opacity:0;pointer-events:none;white-space:nowrap;max-width:90vw}
.toast-msg.show{transform:translateX(-50%) translateY(0);opacity:1}

/* BOTTOM TABS */
.app-tabs{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--tabs-h);background:var(--navy);display:flex;border-top:2px solid var(--orange)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;color:rgba(255,255,255,.6);font-size:10px;font-weight:600;gap:2px}
.tab-item.active,.tab-item:hover{color:var(--orange)}
.tab-item .tab-icon{font-size:18px;line-height:1}
.tab-fab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-decoration:none;font-size:10px;font-weight:600;color:rgba(255,255,255,.6);gap:2px;position:relative}
.fab-circle{width:46px;height:46px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:20px;margin-top:-16px;border:3px solid var(--navy)}
.fab-label{font-size:10px;color:rgba(255,255,255,.6)}
  </style>
</head>
<body>

<!-- TOPBAR -->
<header class="s-topbar">
  <a href="/app/home" class="logo">
    <img src="/assets/images/logo.png" alt="FWF"/>
    <span class="logo-text">Store</span>
  </a>
  <form class="s-search" onsubmit="searchProducts(event)">
    <input type="text" id="searchInput" placeholder="Search products..." autocomplete="off"/>
    <button type="submit"><i class="fas fa-search"></i></button>
  </form>
  <div class="tb-right">
    <button class="tb-icon-btn" onclick="openWishSheet()" title="Saved">
      <i class="far fa-heart"></i>
      <span class="tb-badge" id="wishBadge" style="display:none">0</span>
    </button>
    <button class="tb-icon-btn" onclick="openCartSheet()" title="Cart">
      <i class="fas fa-shopping-cart"></i>
      <span class="tb-badge" id="cartBadge" style="display:none">0</span>
    </button>
  </div>
</header>

<!-- CATEGORY CIRCLES (Amazon-style) -->
<div class="cat-circles-wrap">
  <div class="cat-circles" id="catCircles">
    <div class="cat-circle-item active" data-cat="all" onclick="filterCat('all',this)">
      <div class="cat-circle-img">&#128722;</div>
      <div class="cat-circle-label">All</div>
    </div>
  </div>
</div>

<!-- OFFER BANNER -->
<div class="offer-banner">
  <div class="offer-badge">&#127470;&#127475; VOCAL FOR LOCAL</div>
  <div>
    <div class="offer-text">Handmade by Indian Women</div>
    <div class="offer-sub">Every purchase empowers an artisan</div>
  </div>
</div>

<!-- SORT BAR -->
<div class="sort-bar">
  <div class="result-cnt" id="resultCnt">Loading...</div>
  <select class="sort-select" id="sortSelect" onchange="loadProducts()">
    <option value="">Featured</option>
    <option value="newest">Newest</option>
    <option value="price-low">Price &#8593;</option>
    <option value="price-high">Price &#8595;</option>
    <option value="popular">Best Sellers</option>
  </select>
</div>

<!-- PRODUCTS GRID -->
<div class="products-grid" id="productsGrid">
  <div class="product-card"><div class="card-img skeleton" style="height:150px"></div><div class="card-body"><div class="skeleton" style="height:12px;margin-bottom:4px;border-radius:3px"></div><div class="skeleton" style="height:10px;width:60%;border-radius:3px"></div></div></div>
  <div class="product-card"><div class="card-img skeleton" style="height:150px"></div><div class="card-body"><div class="skeleton" style="height:12px;margin-bottom:4px;border-radius:3px"></div><div class="skeleton" style="height:10px;width:60%;border-radius:3px"></div></div></div>
  <div class="product-card"><div class="card-img skeleton" style="height:150px"></div><div class="card-body"><div class="skeleton" style="height:12px;margin-bottom:4px;border-radius:3px"></div><div class="skeleton" style="height:10px;width:60%;border-radius:3px"></div></div></div>
  <div class="product-card"><div class="card-img skeleton" style="height:150px"></div><div class="card-body"><div class="skeleton" style="height:12px;margin-bottom:4px;border-radius:3px"></div><div class="skeleton" style="height:10px;width:60%;border-radius:3px"></div></div></div>
</div>

<div class="pagination" id="pagination"></div>

<!-- SELL CTA -->
<div class="sell-cta" id="sellCta">
  <h4>&#127775; Sell on FWF Store</h4>
  <p>List your handmade products. Free for FWF members. Reach thousands of buyers!</p>
  <a href="/app/dashboard">+ Add Your Product</a>
</div>

<!-- PRODUCT DETAIL SHEET -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="product-sheet" id="productSheet">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeSheet()"><i class="fas fa-times"></i></button>
  <div class="sheet-body" id="sheetBody">
    <div class="sheet-loading"><i class="fas fa-spinner" style="animation:spin 1s linear infinite;font-size:2rem;color:#e47911"></i></div>
  </div>
</div>

<!-- CART SHEET -->
<div class="sheet-overlay" id="cartOverlay" onclick="closeCartSheet()"></div>
<div class="product-sheet" id="cartSheet" style="max-height:75vh">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeCartSheet()"><i class="fas fa-times"></i></button>
  <div style="padding:8px 16px 4px;font-size:16px;font-weight:700;border-bottom:1px solid #eee">&#128722; Cart (<span id="cartCountSheet">0</span>)</div>
  <div class="sheet-body" id="cartBody" style="padding:0 12px 12px"></div>
  <div id="cartFooterSheet" style="padding:12px 16px;border-top:1px solid #eee;display:none">
    <div style="display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:10px">
      <span>Subtotal</span><span id="cartTotalSheet">&#8377;0</span>
    </div>
    <button style="width:100%;background:#ffd814;border:1px solid #e47911;border-radius:22px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;color:#111;font-family:inherit" onclick="closeCartSheet()">Proceed to Checkout</button>
  </div>
</div>

<!-- WISHLIST SHEET -->
<div class="sheet-overlay" id="wishOverlay" onclick="closeWishSheet()"></div>
<div class="product-sheet" id="wishSheet" style="max-height:75vh">
  <div class="sheet-handle"></div>
  <button class="sheet-close" onclick="closeWishSheet()"><i class="fas fa-times"></i></button>
  <div style="padding:8px 16px 4px;font-size:16px;font-weight:700;border-bottom:1px solid #eee">&#128153; Saved (<span id="wishCountSheet">0</span>)</div>
  <div class="sheet-body" id="wishBody" style="padding:0 12px 12px"></div>
</div>

<!-- TOAST -->
<div class="toast-msg" id="toastMsg"></div>

<!-- BOTTOM TABS -->
<nav class="app-tabs">
  <a href="/app/home" class="tab-item"><span class="tab-icon">&#127968;</span><span>Home</span></a>
  <a href="/app/projects" class="tab-item"><span class="tab-icon">&#127807;</span><span>Projects</span></a>
  <a href="/app/donate" class="tab-fab"><div class="fab-circle">&#10084;&#65039;</div><span class="fab-label">Donate</span></a>
  <a href="/app/quiz" class="tab-item"><span class="tab-icon">&#127922;</span><span>Quiz</span></a>
  <a href="/app/profile" class="tab-item active"><span class="tab-icon">&#128100;</span><span>Account</span></a>
</nav>

<script>
const BACKEND = 'https://fwf-production.up.railway.app';
let currentCat = 'all';
let currentPage = 1;
let allCategories = {};
let orderQty = 1;
let sheetProduct = null;
let cart = JSON.parse(localStorage.getItem('fwf_cart') || '[]');
let wishlist = JSON.parse(localStorage.getItem('fwf_wish') || '[]');

function getToken(){ return localStorage.getItem('fwf-token'); }
function getUser(){ return JSON.parse(localStorage.getItem('fwf-user') || 'null'); }
function isLoggedIn(){ return !!getToken(); }
function fmtPrice(n){ return Number(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function esc(s){ if(!s)return''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function starsHtml(r){ const rt=Math.round((r||4)*2)/2; let s=''; for(let i=1;i<=5;i++){ if(i<=rt)s+='\u2605'; else if(i-.5===rt)s+='\u2BF8'; else s+='\u2606'; } return s; }
function showToast(msg){ const t=document.getElementById('toastMsg'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

// CART
function saveCart(){ localStorage.setItem('fwf_cart',JSON.stringify(cart)); updateBadges(); }
function saveWish(){ localStorage.setItem('fwf_wish',JSON.stringify(wishlist)); updateBadges(); }
function updateBadges(){
  const cc=cart.reduce((s,i)=>s+i.qty,0);
  const cb=document.getElementById('cartBadge');
  cb.textContent=cc; cb.style.display=cc?'flex':'none';
  const wc=wishlist.length;
  const wb=document.getElementById('wishBadge');
  wb.textContent=wc; wb.style.display=wc?'flex':'none';
  document.getElementById('cartCountSheet').textContent=cc;
  document.getElementById('wishCountSheet').textContent=wc;
}
function addToCart(p,qty){
  qty=qty||1; const pid=p.product_id||p.id;
  const ex=cart.find(i=>i.id===pid);
  if(ex){ ex.qty+=qty; } else { cart.push({id:pid,title:p.title,price:p.price,image:p.thumbnail||(p.images&&p.images[0])||'',seller:p.seller_name||'FWF',qty:qty}); }
  saveCart(); showToast('\u2705 Added to cart');
}
function removeFromCart(pid){ cart=cart.filter(i=>i.id!==pid); saveCart(); renderCartBody(); }
function updateCartQty(pid,delta){ const it=cart.find(i=>i.id===pid); if(!it)return; it.qty=Math.max(1,it.qty+delta); saveCart(); renderCartBody(); }
function toggleWish(p){
  const pid=p.product_id||p.id;
  const idx=wishlist.findIndex(w=>w.id===pid);
  if(idx>=0){ wishlist.splice(idx,1); showToast('Removed from saved'); }
  else { wishlist.push({id:pid,title:p.title,price:p.price,image:p.thumbnail||(p.images&&p.images[0])||''}); showToast('\ud83d\udc99 Saved!'); }
  saveWish();
  const wb=document.querySelector('.btn-sheet-wish');
  if(wb){ const iw=wishlist.some(w=>w.id===pid); wb.classList.toggle('wishlisted',iw); wb.textContent=iw?'\ud83d\udc99 Saved':'\ud83e\udde1 Save for Later'; }
}

function renderCartBody(){
  const el=document.getElementById('cartBody');
  const ft=document.getElementById('cartFooterSheet');
  if(!cart.length){ el.innerHTML='<div style="text-align:center;padding:24px;color:#888"><i class="fas fa-shopping-cart" style="font-size:2rem;opacity:.3;display:block;margin-bottom:8px"></i>Cart is empty</div>'; ft.style.display='none'; return; }
  ft.style.display='block';
  let total=0;
  el.innerHTML='<div>'+cart.map(item=>{
    total+=item.price*item.qty;
    return '<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;align-items:center">'+
      '<div style="width:56px;height:56px;background:#f8f8f8;border-radius:4px;overflow:hidden;flex-shrink:0">'+(item.image?'<img src="'+item.image+'" style="width:100%;height:100%;object-fit:cover"/>':'')+'</div>'+
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:12px;font-weight:600;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(item.title)+'</div>'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<button style="width:22px;height:22px;border:1px solid #ccc;background:#f0f2f2;border-radius:3px;cursor:pointer;font-weight:700;font-size:11px;font-family:inherit" onclick="updateCartQty(\''+item.id+'\',-1)">&#8722;</button>'+
          '<span style="font-size:12px;font-weight:700">'+item.qty+'</span>'+
          '<button style="width:22px;height:22px;border:1px solid #ccc;background:#f0f2f2;border-radius:3px;cursor:pointer;font-weight:700;font-size:11px;font-family:inherit" onclick="updateCartQty(\''+item.id+'\',1)">+</button>'+
        '</div>'+
      '</div>'+
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'+
        '<div style="font-size:13px;font-weight:800">&#8377;'+fmtPrice(item.price*item.qty)+'</div>'+
        '<button style="border:none;background:none;color:#aaa;cursor:pointer;font-size:12px" onclick="removeFromCart(\''+item.id+'\')"><i class="fas fa-trash"></i></button>'+
      '</div>'+
    '</div>';
  }).join('')+'</div>';
  document.getElementById('cartTotalSheet').textContent='&#8377;'+fmtPrice(total);
}

function renderWishBody(){
  const el=document.getElementById('wishBody');
  if(!wishlist.length){ el.innerHTML='<div style="text-align:center;padding:24px;color:#888"><i class="far fa-heart" style="font-size:2rem;opacity:.3;display:block;margin-bottom:8px"></i>No saved items</div>'; return; }
  el.innerHTML='<div>'+wishlist.map(item=>
    '<div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;align-items:center" onclick="openProduct(\''+item.id+'\');closeWishSheet()">'+
      '<div style="width:52px;height:52px;background:#f8f8f8;border-radius:4px;overflow:hidden;flex-shrink:0">'+(item.image?'<img src="'+item.image+'" style="width:100%;height:100%;object-fit:cover"/>':'')+'</div>'+
      '<div style="flex:1;cursor:pointer">'+
        '<div style="font-size:12px;font-weight:600;margin-bottom:3px">'+esc(item.title)+'</div>'+
        '<div style="font-size:13px;font-weight:800">&#8377;'+fmtPrice(item.price)+'</div>'+
      '</div>'+
      '<button style="border:none;background:none;color:#aaa;cursor:pointer;font-size:12px" onclick="event.stopPropagation();wishlist=wishlist.filter(w=>w.id!==\''+item.id+'\');saveWish();renderWishBody()"><i class="fas fa-trash"></i></button>'+
    '</div>'
  ).join('')+'</div>';
}

function openCartSheet(){ renderCartBody(); document.getElementById('cartOverlay').classList.add('show'); document.getElementById('cartSheet').classList.add('show'); }
function closeCartSheet(){ document.getElementById('cartOverlay').classList.remove('show'); document.getElementById('cartSheet').classList.remove('show'); }
function openWishSheet(){ renderWishBody(); document.getElementById('wishOverlay').classList.add('show'); document.getElementById('wishSheet').classList.add('show'); }
function closeWishSheet(){ document.getElementById('wishOverlay').classList.remove('show'); document.getElementById('wishSheet').classList.remove('show'); }

// CATEGORIES
const CAT_ICONS={'electronics':'\ud83d\udcbb','womens-fashion':'\ud83d\udc57','mens-fashion':'\ud83d\udc54','home-kitchen':'\ud83c\udfe1','beauty-health':'\u2728','handicraft-art':'\ud83c\udfa8','organic-natural':'\ud83c\udf3f','sports-outdoor':'\u26bd','books-media':'\ud83d\udcda','toys-games':'\ud83c\udfae','jewelry-accessories':'\ud83d\udc8e','food-spices':'\ud83c\udf36\ufe0f','textiles':'\ud83e\uddf5','pottery':'\ud83c\udffa','wood-craft':'\ud83e\udeb5'};

async function loadCategories(){
  try{
    const r=await fetch(BACKEND+'/api/store/categories');
    const d=await r.json();
    if(!d.ok) return;
    allCategories=d.categories;
    const strip=document.getElementById('catCircles');
    let html='<div class="cat-circle-item active" data-cat="all" onclick="filterCat(\'all\',this)"><div class="cat-circle-img">\ud83d\udecd\ufe0f</div><div class="cat-circle-label">All</div></div>';
    for(const [key,cat] of Object.entries(d.categories)){
      html+='<div class="cat-circle-item" data-cat="'+key+'" onclick="filterCat(\''+key+'\',this)">'+
        '<div class="cat-circle-img">'+(CAT_ICONS[key]||'\ud83d\udce6')+'</div>'+
        '<div class="cat-circle-label">'+esc(cat.label)+'</div>'+
      '</div>';
    }
    strip.innerHTML=html;
  }catch(e){ console.error(e); }
}

function filterCat(cat,el){
  currentCat=cat; currentPage=1;
  document.querySelectorAll('.cat-circle-item').forEach(c=>c.classList.remove('active'));
  if(el) el.classList.add('active');
  else{ const f=document.querySelector('.cat-circle-item[data-cat="'+cat+'"]'); if(f) f.classList.add('active'); }
  loadProducts();
}

// PRODUCTS
function searchProducts(e){ e.preventDefault(); currentPage=1; loadProducts(); }

async function loadProducts(){
  const grid=document.getElementById('productsGrid');
  grid.innerHTML='<div class="empty-state" style="grid-column:1/-1;padding:32px"><i class="fas fa-spinner" style="animation:spin 1s linear infinite;font-size:2rem;color:#e47911;display:block;margin-bottom:8px"></i><p>Loading...</p></div>';
  const params=new URLSearchParams();
  if(currentCat&&currentCat!=='all') params.set('category',currentCat);
  const q=document.getElementById('searchInput').value.trim();
  if(q) params.set('search',q);
  const sort=document.getElementById('sortSelect').value;
  if(sort) params.set('sort',sort);
  params.set('page',currentPage); params.set('limit',20);
  try{
    const r=await fetch(BACKEND+'/api/store/products?'+params.toString());
    const d=await r.json();
    if(!d.ok||!d.products?.length){
      grid.innerHTML='<div class="empty-state"><div class="es-icon">\ud83e\udeba</div><h3>No products found</h3><p>Try a different category</p></div>';
      document.getElementById('resultCnt').textContent='0 results';
      document.getElementById('pagination').innerHTML=''; return;
    }
    const total=d.total||d.products.length;
    document.getElementById('resultCnt').textContent=total.toLocaleString('en-IN')+' result'+(total!==1?'s':'');
    grid.innerHTML=d.products.map(p=>renderCard(p)).join('');
    renderPager(d.page,d.pages);
    updateBadges();
  }catch(e){
    grid.innerHTML='<div class="empty-state"><div class="es-icon">\ud83c\udf10</div><h3>Connection Error</h3><p>Please try again</p></div>';
  }
}

function renderCard(p){
  const imgHtml=(p.thumbnail||(p.images&&p.images[0]))?'<img src="'+(p.thumbnail||p.images[0])+'" alt="'+esc(p.title)+'" loading="lazy"/>'
    :'<div class="card-img-ph">\ud83d\udce6</div>';
  const rating=p.rating_avg||(4.0+Math.random()*.9);
  const rc=p.rating_count||Math.floor(Math.random()*2000+50);
  const disc=p.discount_percent||(p.mrp&&p.mrp>p.price?Math.round((1-p.price/p.mrp)*100):0);
  const isW=wishlist.some(w=>w.id===p.product_id);
  const pData=JSON.stringify({product_id:p.product_id,title:p.title,price:p.price,thumbnail:p.thumbnail,images:p.images,seller_name:p.seller_name,mrp:p.mrp,discount_percent:disc});
  const pAttr=pData.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return '<div class="product-card" data-p="'+pAttr+'" onclick="openProduct(\''+p.product_id+'\')">'+
    (disc>=5?'<div class="card-disc-badge">'+disc+'% off</div>':'')+
    '<div class="card-img">'+imgHtml+
      '<button class="wish-btn '+(isW?'wishlisted':'')+'" onclick="event.stopPropagation();toggleWish(JSON.parse(this.closest(\'.product-card\').dataset.p))">'+(isW?'<i class="fas fa-heart"></i>':'<i class="far fa-heart"></i>')+'</button>'+
    '</div>'+
    '<div class="card-body">'+
      '<div class="card-name">'+esc(p.title)+'</div>'+
      '<div class="card-seller">'+esc(p.seller_name||'FWF Member')+'</div>'+
      '<div class="card-stars"><span class="stars">'+starsHtml(rating)+'</span><span class="star-cnt">'+(rc>999?(rc/1000).toFixed(1)+'k':rc)+'</span></div>'+
      '<div class="price-row"><span class="card-price">&#8377;'+fmtPrice(p.price)+'</span>'+(p.mrp&&p.mrp>p.price?'<span class="card-mrp">&#8377;'+fmtPrice(p.mrp)+'</span><span class="card-off">'+disc+'% off</span>':'')+'</div>'+
      '<div class="card-free">\u2713 FREE Delivery</div>'+
      '<button class="card-btn" onclick="event.stopPropagation();addToCart(JSON.parse(this.closest(\'.product-card\').dataset.p))">Add to Cart</button>'+
    '</div>'+
  '</div>';
}

function renderPager(page,pages){
  const el=document.getElementById('pagination');
  if(!pages||pages<=1){ el.innerHTML=''; return; }
  let h='<button '+(page<=1?'disabled':'')+' onclick="goPage('+(page-1)+')">&#8249;</button>';
  for(let i=Math.max(1,page-1);i<=Math.min(pages,page+1);i++) h+='<button class="'+(i===page?'active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  h+='<button '+(page>=pages?'disabled':'')+' onclick="goPage('+(page+1)+')">&#8250;</button>';
  el.innerHTML=h;
}
function goPage(p){ currentPage=p; loadProducts(); window.scrollTo({top:0,behavior:'smooth'}); }

// PRODUCT DETAIL SHEET
async function openProduct(productId){
  const overlay=document.getElementById('sheetOverlay');
  const sheet=document.getElementById('productSheet');
  const body=document.getElementById('sheetBody');
  overlay.classList.add('show'); sheet.classList.add('show');
  document.body.style.overflow='hidden';
  body.innerHTML='<div class="sheet-loading"><i class="fas fa-spinner" style="animation:spin 1s linear infinite;font-size:2rem;color:#e47911"></i></div>';
  try{
    const r=await fetch(BACKEND+'/api/store/product/'+productId);
    const d=await r.json();
    if(!d.ok){ body.innerHTML='<div class="sheet-loading">Product not found</div>'; return; }
    sheetProduct=d.product;
    renderSheet(d.product);
  }catch(e){ body.innerHTML='<div class="sheet-loading">Failed to load</div>'; }
}

function renderSheet(p){
  const body=document.getElementById('sheetBody');
  orderQty=1;
  const mainImg=(p.thumbnail||(p.images&&p.images[0]))?'<img src="'+(p.thumbnail||(p.images&&p.images[0]))+'" alt="'+esc(p.title)+'" style="width:100%;height:220px;object-fit:cover"/>'
    :'<div style="width:100%;height:180px;background:#f8f8f8;display:flex;align-items:center;justify-content:center;font-size:4rem">\ud83d\udce6</div>';
  const disc=p.discount_percent||(p.mrp&&p.mrp>p.price?Math.round((1-p.price/p.mrp)*100):0);
  const rating=(p.rating_avg||(4.2+Math.random()*.7)).toFixed(1);
  const rc=p.rating_count||Math.floor(Math.random()*5000+100);
  const isW=wishlist.some(w=>w.id===p.product_id);
  const stockCls=p.stock>5?'green':(p.stock>0?'orange':'red');
  const stockTxt=p.stock>5?'\u2713 In Stock':(p.stock>0?'\u26a1 Only '+p.stock+' left!':'\u2717 Out of Stock');
  const catLabel=(allCategories[p.category]&&allCategories[p.category].label)||p.category||'';
  const mrpHtml=p.mrp&&p.mrp>p.price?'<span class="sheet-mrp">&#8377;'+fmtPrice(p.mrp)+'</span><span class="sheet-off">'+disc+'% off</span>':'';
  body.innerHTML=
    mainImg+
    '<div class="sheet-info">'+
      (catLabel?'<div class="sheet-cat">'+esc(catLabel)+'</div>':'')+
      '<h2 class="sheet-title">'+esc(p.title)+'</h2>'+
      '<div class="sheet-seller">by <strong>'+esc(p.seller_name||'FWF Seller')+'</strong>&nbsp;&nbsp;<span style="color:var(--green)">\u2713 Verified</span></div>'+
      '<div class="sheet-stars"><span class="stars" style="font-size:16px">'+starsHtml(+rating)+'</span><span style="font-size:12px;color:var(--link)">'+rating+' ('+Number(rc).toLocaleString('en-IN')+')</span></div>'+
      '<div class="sheet-price-row"><span class="sheet-price">&#8377;'+fmtPrice(p.price)+'</span>'+mrpHtml+'</div>'+
      '<div class="sheet-stock '+stockCls+'">'+stockTxt+'</div>'+
      '<div class="sheet-actions">'+
        '<button class="btn-sheet-cart" onclick="addToCart(sheetProduct,orderQty)" '+(p.stock<=0?'disabled':'')+'><i class="fas fa-shopping-cart"></i> Add to Cart</button>'+
        '<button class="btn-sheet-buy" onclick="addToCart(sheetProduct,orderQty);closeSheet()"><i class="fas fa-bolt"></i> Buy Now</button>'+
        '<button class="btn-sheet-wish '+(isW?'wishlisted':'')+'" onclick="toggleWish(sheetProduct);this.classList.toggle(\'wishlisted\')">'+(isW?'\ud83d\udc99 Saved':'\ud83e\udde1 Save for Later')+'</button>'+
      '</div>'+
      (p.description?'<div class="sheet-desc">'+esc(p.description)+'</div>':'')+
      '<div class="order-section">'+
        '<h4><i class="fas fa-clipboard-list" style="color:#e47911;margin-right:6px"></i>Place Order</h4>'+
        '<div class="order-form" id="sheetOrderForm">'+
          '<input type="text" id="sOName" placeholder="Full Name *"/>'+
          '<input type="text" id="sOContact" placeholder="Mobile Number *"/>'+
          '<textarea id="sOAddr" placeholder="Delivery Address *"></textarea>'+
          '<div class="qty-row">'+
            '<button class="qty-btn" onclick="sheetQty(-1)">&#8722;</button>'+
            '<span class="qty-val" id="sheetQtyVal">1</span>'+
            '<button class="qty-btn" onclick="sheetQty(1)">+</button>'+
            '<span style="font-size:13px;color:#555;margin-left:6px">= <strong id="sheetTotal">&#8377;'+fmtPrice(p.price)+'</strong></span>'+
          '</div>'+
          '<select id="sOPay"><option value="online">\ud83d\udcb3 Online</option><option value="upi">\ud83d\udcf1 UPI</option><option value="cod">\ud83d\udcb5 Cash on Delivery</option></select>'+
          '<button class="btn-order" id="btnSheetOrder" onclick="placeSheetOrder(\''+p.product_id+'\','+p.price+')" '+(p.stock<=0?'disabled':'')+'>'+
            (p.stock>0?'<i class="fas fa-check-circle"></i> Place Order':'Out of Stock')+
          '</button>'+
        '</div>'+
      '</div>'+
      '<div class="order-success" id="sheetOrderSuccess">'+
        '<div class="ok-icon"><i class="fas fa-check-circle"></i></div>'+
        '<h3>Order Placed!</h3>'+
        '<p id="sheetSuccessMsg">We will contact you shortly.</p>'+
      '</div>'+
    '</div>';
}

function sheetQty(d){
  orderQty=Math.max(1,orderQty+d);
  document.getElementById('sheetQtyVal').textContent=orderQty;
  if(sheetProduct) document.getElementById('sheetTotal').textContent='&#8377;'+fmtPrice(sheetProduct.price*orderQty);
}

async function placeSheetOrder(pid,unitPrice){
  const name=document.getElementById('sOName').value.trim();
  const contact=document.getElementById('sOContact').value.trim();
  const addr=document.getElementById('sOAddr').value.trim();
  const pay=document.getElementById('sOPay').value;
  if(!name||!contact||!addr){ showToast('\u26a0\ufe0f Fill Name, Mobile & Address'); return; }
  const btn=document.getElementById('btnSheetOrder'); btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Placing...';
  try{
    const r=await fetch(BACKEND+'/api/store/order',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({productId:pid,quantity:orderQty,buyerName:name,buyerContact:contact,buyerAddress:addr,paymentMode:pay})});
    const d=await r.json();
    if(d.ok){
      document.getElementById('sheetOrderForm').style.display='none';
      const suc=document.getElementById('sheetOrderSuccess'); suc.classList.add('show');
      document.getElementById('sheetSuccessMsg').innerHTML='Order ID: <strong>'+d.orderId+'</strong><br/>Total: &#8377;'+fmtPrice(d.total)+"<br/>We'll contact you soon!";
      showToast('\u2705 Order placed!');
      cart=cart.filter(i=>i.id!==pid); saveCart();
    }else{ showToast(d.error||'Failed. Try again.'); btn.disabled=false; btn.innerHTML='<i class="fas fa-check-circle"></i> Place Order'; }
  }catch(e){ showToast('Network error.'); btn.disabled=false; btn.innerHTML='<i class="fas fa-check-circle"></i> Place Order'; }
}

function closeSheet(){ document.getElementById('sheetOverlay').classList.remove('show'); document.getElementById('productSheet').classList.remove('show'); document.body.style.overflow=''; sheetProduct=null; }

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeSheet(); closeCartSheet(); closeWishSheet(); } });

(async function(){
  updateBadges();
  if(isLoggedIn()) document.getElementById('sellCta').style.display='block';
  await loadCategories();
  await loadProducts();
})();
</script>
</body>
</html>
